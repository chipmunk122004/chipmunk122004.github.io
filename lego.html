<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legos — Aidan McCauley</title>
  <meta name="description" content="Lego portfolio by Aidan McCauley.">
  <link rel="icon" type="image/png" href="assets/am.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <nav aria-label="Primary">
    <div class="logo-wrap">
      <img class="logo-mark" src="assets/am.png" alt="" aria-hidden="true">
      <button class="logo-toggle" id="logoToggle" aria-expanded="false" aria-controls="mobilePanel">
        <img src="assets/am.png" alt="">
        <span class="sr-only">Open section menu</span>
      </button>
    </div>

    <ul class="desktop-nav" id="desktopNav">
      <li class="desktop-nav-item" data-section="contact">
        <button class="menu-button" type="button">
          <p class="header-text">Contact</p>
        </button>
        <ul class="dropdown" id="desk-contact"></ul>
      </li>
      <li class="desktop-nav-item" data-section="about">
        <button class="menu-button" type="button">
          <p class="header-text">About</p>
        </button>
        <ul class="dropdown" id="desk-about"></ul>
      </li>
      <li class="desktop-nav-item" data-section="portfolio">
        <button class="menu-button" type="button">
          <p class="header-text">Portfolio</p>
        </button>
        <ul class="dropdown" id="desk-portfolio"></ul>
      </li>
    </ul>
  </nav>

  <div class="mobile-panel" id="mobilePanel" aria-label="Mobile section menu">
    <div class="mobile-menu-grid">
      <div class="mobile-left">
        <button class="mobile-section-button" type="button" data-section="contact">
          <img class="nav-label-img" src="assets/contact.png" alt="Contact">
        </button>
        <button class="mobile-section-button" type="button" data-section="about">
          <img class="nav-label-img" src="assets/about.png" alt="About">
        </button>
        <button class="mobile-section-button" type="button" data-section="portfolio">
          <p class="header-text">Portfolio</p>
        </button>
      </div>
      <div class="mobile-right">
        <div class="mobile-right-list" id="mobile-group-contact" data-section="contact">
          <ul class="mobile-dropdown" id="mobile-contact"></ul>
        </div>
        <div class="mobile-right-list" id="mobile-group-about" data-section="about">
          <ul class="mobile-dropdown" id="mobile-about"></ul>
        </div>
        <div class="mobile-right-list" id="mobile-group-portfolio" data-section="portfolio">
          <ul class="mobile-dropdown" id="mobile-portfolio"></ul>
        </div>
      </div>
    </div>
  </div>

  <main id="content">
    <section aria-labelledby="lego-heading">
      <div class="section-inner">
        <h2 id="lego-heading">Legos</h2>
        <!--
          Add lego images here as a .portfolio-track div (same pattern as art.html),
          or drop image files into assets/lego/ and add them to site-content.js
          once a legoPortfolioItems array is wired up in script.js.
        -->
        <p style="color: var(--main-text); margin-top: 1rem; font-size: clamp(1rem, 2vw, 1.2rem);">
          Coming soon.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p class="footer-note" id="footerNote"></p>
  </footer>

  <script src="site-content.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
